[build]
  command = "npm ci && npm run build && rm -rf demo/dist && cp -r dist demo/dist"
  publish = "demo"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/dist/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/javascript; charset=utf-8"
